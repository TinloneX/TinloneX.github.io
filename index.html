<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TinloneX | Planet Gateway</title>
  <meta name="description" content="TinloneX 的星球入口页，通往博客、NoBTI 与创意工坊。">
  <style>
    :root{
      --bg:#06111f;--bg2:#101d33;--fg:#f4f0e8;--muted:#a8b4c7;--line:rgba(255,255,255,.12);
      --blog:#73d7ff;--test:#ff9b73;--lab:#b4ff9c;--card:rgba(7,18,34,.54);--shadow:0 24px 70px rgba(0,0,0,.3)
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-width:320px;color:var(--fg);font-family:"Space Grotesk","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:
      radial-gradient(circle at 20% 20%,rgba(115,215,255,.16),transparent 18%),
      radial-gradient(circle at 82% 24%,rgba(255,155,115,.13),transparent 20%),
      radial-gradient(circle at 50% 80%,rgba(180,255,156,.12),transparent 22%),
      linear-gradient(180deg,var(--bg),var(--bg2))}
    body{overflow-x:hidden}
    .starfield{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
    .page{width:100%;min-height:100vh;margin:0;padding:0;position:relative;z-index:1}
    .console,.planet-card{background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:32px}
    .hero{padding:0;position:relative;overflow:visible;background:transparent;border:0;box-shadow:none;backdrop-filter:none;border-radius:0}
    .eyebrow{margin:0;color:#8cc5ff;font-size:.82rem;letter-spacing:.32em;text-transform:uppercase}
    .title{margin:12px 0 10px;font-size:clamp(2.7rem,7vw,5.8rem);line-height:.95}
    .title span{display:block;color:#ffe8cb}
    .subtitle{max-width:48rem;margin:0;color:var(--muted);line-height:1.9}
    .hero-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;margin-top:24px}
    .console{padding:18px}
    .console h2,.map h2{margin:0 0 10px;font-size:1.04rem}
    .console p,.planet-copy p,.meta p{margin:0;color:var(--muted);line-height:1.8}
    .console-list{margin:14px 0 0;padding:0;list-style:none;display:grid;gap:10px}
    .console-list li{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .map{position:relative;min-height:620px;margin-top:24px;padding:24px;overflow:hidden}
    .orbit,.sun,.planet-link,.planet-ring,.dust{position:absolute}
    .sun{left:50%;top:50%;width:180px;height:180px;transform:translate(-50%,-50%);border-radius:50%;background:
      radial-gradient(circle at 35% 35%,#fff7c8 0%,#ffd993 30%,#ffac69 65%,rgba(255,172,105,.3) 100%);
      box-shadow:0 0 70px rgba(255,196,116,.38),0 0 150px rgba(255,140,87,.18)}
    .orbit{left:50%;top:50%;border:1px solid rgba(255,255,255,.11);border-radius:50%;transform:translate(-50%,-50%)}
    .orbit.one{width:320px;height:320px}
    .orbit.two{width:520px;height:520px}
    .orbit.three{width:760px;height:760px}
    .dust{inset:-20%;background:
      radial-gradient(circle at 30% 40%,rgba(115,215,255,.1),transparent 12%),
      radial-gradient(circle at 72% 54%,rgba(255,155,115,.09),transparent 14%),
      radial-gradient(circle at 48% 70%,rgba(180,255,156,.08),transparent 16%);
      filter:blur(24px);animation:floatDust 14s ease-in-out infinite alternate}
    .planet-link{left:50%;top:50%;display:block;text-decoration:none;color:inherit;transform-origin:center center;--orbit-radius:160px;--orbit-angle:0deg;animation:orbitSpin 48s linear infinite}
    .planet-link.blog{--orbit-radius:160px;--orbit-angle:18deg;animation-duration:42s}
    .planet-link.test{--orbit-radius:260px;--orbit-angle:138deg;animation-duration:58s}
    .planet-link.lab{--orbit-radius:380px;--orbit-angle:258deg;animation-duration:74s}
    .planet-card{width:0;height:0;padding:0;background:transparent;border:0;box-shadow:none;backdrop-filter:none;border-radius:0;overflow:visible}
    .planet-globe{width:84px;height:84px;border-radius:50%;position:relative;display:block;transition:transform .25s ease,filter .25s ease}
    .planet-link:hover .planet-globe{transform:scale(1.1);filter:brightness(1.12)}
    .planet-globe::after{content:"";position:absolute;inset:8% 14% 40% 18%;border-radius:50%;background:rgba(255,255,255,.16);filter:blur(4px)}
    .planet-globe.blog{background:
      radial-gradient(circle at 34% 30%,#dffaff 0%,#73d7ff 42%,#2b7dde 70%,#132d63 100%)}
    .planet-globe.test{background:
      radial-gradient(circle at 34% 30%,#fff1d8 0%,#ff9b73 42%,#d0506f 70%,#551a40 100%)}
    .planet-globe.lab{background:
      radial-gradient(circle at 34% 30%,#f2ffe6 0%,#b4ff9c 38%,#39b28f 68%,#0d3b50 100%)}
    .planet-ring{left:-9%;top:46%;width:118%;height:18px;border:2px solid rgba(255,255,255,.28);border-radius:50%;transform:rotate(-16deg)}
    .planet-globe[data-label]::before{
      content:attr(data-label);position:absolute;left:50%;top:112%;transform:translateX(-50%);
      padding:6px 10px;border-radius:999px;background:rgba(7,18,34,.72);border:1px solid rgba(255,255,255,.12);
      color:var(--fg);font-size:.82rem;white-space:nowrap;opacity:0;transition:opacity .2s ease,transform .2s ease;pointer-events:none
    }
    .planet-link:hover .planet-globe[data-label]::before{opacity:1;transform:translateX(-50%) translateY(4px)}
    .legend{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:22px}
    .meta{padding:16px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.05)}
    .meta strong{display:block;margin-bottom:8px}
    .hint{margin-top:18px;text-align:center;color:var(--muted);font-size:.92rem}
    @keyframes orbitSpin{
      from{transform:translate(-50%,-50%) rotate(var(--orbit-angle)) translateX(var(--orbit-radius)) rotate(calc(-1 * var(--orbit-angle)))}
      to{transform:translate(-50%,-50%) rotate(calc(var(--orbit-angle) + 360deg)) translateX(var(--orbit-radius)) rotate(calc(-1 * (var(--orbit-angle) + 360deg)))}
    }
    @keyframes floatDust{0%{transform:translate3d(-2%,0,0)}100%{transform:translate3d(2%,-2%,0)}}
    @media (max-width:1024px){
      .hero-grid,.legend{grid-template-columns:1fr}
      .map{min-height:940px}
      .orbit.three{width:640px;height:640px}
      .planet-link.blog{--orbit-radius:120px}
      .planet-link.test{--orbit-radius:200px}
      .planet-link.lab{--orbit-radius:300px}
    }
    @media (max-width:720px){
      .page{width:100%;padding:0}
      .console,.planet-card{border-radius:24px}
      .map{padding:18px}
      .map{min-height:980px}
      .sun{width:130px;height:130px}
      .orbit.one{width:240px;height:240px}
      .orbit.two{width:390px;height:390px}
      .orbit.three{width:540px;height:540px}
      .planet-globe{width:70px;height:70px}
      .planet-link.blog{--orbit-radius:120px}
      .planet-link.test{--orbit-radius:195px}
      .planet-link.lab{--orbit-radius:270px}
    }
  </style>
</head>
<body class="space">
  <canvas class="starfield" id="starfield" aria-hidden="true"></canvas>
  <main class="page">
    <section class="map hero">
      <div class="dust" aria-hidden="true"></div>
      <div class="sun" aria-hidden="true"></div>
      <div class="orbit one" aria-hidden="true"></div>
      <div class="orbit two" aria-hidden="true"></div>
      <div class="orbit three" aria-hidden="true"></div>

      <a class="planet-link blog" href="/blog.html" aria-label="进入博客主页">
        <article class="planet-card">
          <span class="planet-globe blog" data-label="博客星球"><span class="planet-ring"></span></span>
        </article>
      </a>

      <a class="planet-link test" href="/nobti.html" aria-label="进入 NoBTI">
        <article class="planet-card">
          <span class="planet-globe test" data-label="NoBTI 星球"><span class="planet-ring"></span></span>
        </article>
      </a>

      <a class="planet-link lab" href="/yinghua.html" aria-label="进入创意工坊">
        <article class="planet-card">
          <span class="planet-globe lab" data-label="创意工坊"><span class="planet-ring"></span></span>
        </article>
      </a>
    </section>

  </main>
  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let width = 0;
    let height = 0;
    let particles = [];

    function resizeStarfield() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      const count = Math.max(90, Math.floor((width * height) / 18000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.8 + 0.4,
        vx: (Math.random() - 0.5) * 0.12,
        vy: Math.random() * 0.22 + 0.04,
        a: Math.random() * 0.7 + 0.2,
        pulse: Math.random() * Math.PI * 2
      }));
    }

    function drawStarfield() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.pulse += 0.02;
        if (p.y > height + 10) {
          p.y = -10;
          p.x = Math.random() * width;
        }
        if (p.x < -10) p.x = width + 10;
        if (p.x > width + 10) p.x = -10;

        const alpha = Math.max(0.08, Math.min(1, p.a + Math.sin(p.pulse) * 0.18));
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = `rgba(115,215,255,${alpha * 0.18})`;
        ctx.arc(p.x, p.y, p.r * 3.4, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(drawStarfield);
    }

    resizeStarfield();
    drawStarfield();
    window.addEventListener('resize', resizeStarfield);
  </script>
</body>
</html>
